<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width:750px )" srcset="foto3.png" type="image/png">
        <source media="(max-width:1050px )" srcset="foto2.png">
        <img src="foto.png" alt="foto grande">
    </picture>

    <h2> Vamos adicionar áudios</h2>
    <p>Vamos adicionar audios no html 5</p>
    <audio preload="auto" autoplay controls loop>
        <source src="Midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="Midia/guanacast-33.ogg" type="audio/ogg">
        <source src="Midia/guanacast-33.wav" type="audio/wav">
        </p>Infelizmente o seu navegador não consegue reproduzir o áudio. <a href="Midia/guanacast-33.mp3">Clique aqui para baixar o arquivo MP3</a></p>       
    </audio>
